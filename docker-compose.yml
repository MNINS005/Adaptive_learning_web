version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB:       learning_platform_project
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./notebook/backup.sql:/docker-entrypoint-initdb.d/backup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data: